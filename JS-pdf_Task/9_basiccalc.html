<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Basic Calculator</h2>

Number 1: <input type="number" id="num1"><br><br>
Number 2: <input type="number" id="num2"><br><br>

<button onclick="calculate('+')">SUM</button>
<button onclick="calculate('-')">SUB</button>
<button onclick="calculate('*')">MUL</button>
<button onclick="calculate('/')">DIV</button>

<h3>Result: <input type="text" id="result" disabled></h3>

<script>
function calculate(op) {
  const n1 = parseFloat(document.getElementById("num1").value);
  const n2 = parseFloat(document.getElementById("num2").value);

  if (isNaN(n1) || isNaN(n2)) {
    alert("Please enter both numbers");
    return;
  }

  let res;
  switch(op) {
    case '+': res = n1 + n2; break;
    case '-': res = n1 - n2; break;
    case '*': res = n1 * n2; break;
    case '/': res = n2 !== 0 ? n1 / n2 : "Cannot divide by zero"; break;
  }

  document.getElementById("result").value = res;
}
</script>
</body>
</html>
